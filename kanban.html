<!DOCTYPE html>
<html>
<head>
  <title>Pipeline CRM — Kanban Board</title>
  <style>
    body { font-family: sans-serif; background: #f4f5f7; margin: 0; padding: 20px; color: #172b4d; }
    .header { margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
    .board { display: flex; gap: 10px; align-items: flex-start; overflow-x: auto; padding-bottom: 20px; }
    .column { background: #ebecf0; border-radius: 3px; width: 280px; flex-shrink: 0; display: flex; flex-direction: column; max-height: 90vh; }
    .column-header { padding: 10px; font-weight: bold; font-size: 12px; text-transform: uppercase; color: #5e6c84; }
    .card-list { padding: 8px; flex-grow: 1; overflow-y: auto; }
    .card { background: white; border-radius: 3px; padding: 10px; margin-bottom: 8px; box-shadow: 0 1px 0 rgba(9,30,66,.25); cursor: pointer; border-left: 4px solid transparent; }
    .card:hover { background: #f4f5f7; }
    .card-name { font-weight: 600; margin-bottom: 5px; font-size: 14px; }
    .card-notes { font-size: 12px; color: #5e6c84; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .stage-select { width: 100%; margin-top: 10px; font-size: 11px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Deal Pipeline</h1>
  </div>
  <div id="board" class="board"></div>
  <script src="kanban.js"></script>
</body>
</html>
